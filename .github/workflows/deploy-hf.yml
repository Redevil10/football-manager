name: Deploy to HF Space

# Manual only — never runs on push/PR.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    # Defence in depth: workflow_dispatch already requires write access, but
    # this also blocks any collaborator added later. Only the owner may deploy.
    if: github.actor == 'Redevil10'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # --no-project: skip syncing the app's deps; the script only needs hub.
        run: uv run --no-project --with huggingface_hub --python 3.13 python deploy_hf.py
