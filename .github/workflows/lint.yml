name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check lockfile is up to date
        run: uv lock --check

      - name: Run ruff lint
        run: uvx ruff check --extend-select=I

      - name: Run ruff format
        run: uvx ruff format --check --diff
